<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON SHOOTER</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  canvas {
    display: block;
    cursor: crosshair;
    border: 1px solid #1a2a3a;
    box-shadow: 0 0 40px #00aaff33;
  }
</style>
</head>
<body>
<canvas id="c" width="800" height="450"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 450;

// ── Stars (static background) ─────────────────────────────────────────────
const STARS = [];
for (let i = 0; i < 70; i++) {
  STARS.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.2 + 0.3, a: Math.random() * 0.6 + 0.2 });
}

// ── Platform layout ───────────────────────────────────────────────────────
const PLATFORMS = [
  { x: 0,   y: 420, w: 800, h: 30 },   // ground
  { x: 60,  y: 340, w: 150, h: 14 },   // far left low
  { x: 290, y: 275, w: 170, h: 14 },   // center mid
  { x: 555, y: 305, w: 130, h: 14 },   // right mid
  { x: 170, y: 190, w: 140, h: 14 },   // left high
  { x: 510, y: 175, w: 155, h: 14 },   // right high
];

// ── Game state ─────────────────────────────────────────────────────────────
let state = 'start'; // 'start' | 'playing' | 'gameover'
let score = 0;
let player, bullets, enemies, particles;
let keys = {};
let mouse = { x: W / 2, y: H / 2 };
let lastSpawn = 0;
let spawnInterval = 2500;
let invincibleTimer = 0;  // frames of invincibility after hit
let flashTimer = 0;       // screen flash on hit

function initGame() {
  score = 0;
  bullets = [];
  enemies = [];
  particles = [];
  lastSpawn = performance.now();
  spawnInterval = 2500;
  invincibleTimer = 0;
  flashTimer = 0;
  player = {
    x: 380, y: 380,
    w: 26, h: 34,
    vx: 0, vy: 0,
    onGround: false,
    lives: 3,
    facing: 1,   // 1=right, -1=left
  };
}

// ── Physics helpers ────────────────────────────────────────────────────────
function applyPlatformCollisions(obj) {
  obj.onGround = false;
  for (const p of PLATFORMS) {
    // AABB overlap check
    const overlapX = obj.x < p.x + p.w && obj.x + obj.w > p.x;
    if (!overlapX) continue;

    const objBottom = obj.y + obj.h;
    const objTop    = obj.y;

    // Landing on top: was above platform top last frame (vy > 0)
    if (obj.vy >= 0 && objBottom >= p.y && objBottom <= p.y + p.h + obj.vy + 2) {
      obj.y = p.y - obj.h;
      obj.vy = 0;
      obj.onGround = true;
    }
    // Hitting head on bottom of platform
    else if (obj.vy < 0 && objTop <= p.y + p.h && objTop >= p.y - 2) {
      obj.y = p.y + p.h;
      obj.vy = 0;
    }
  }
  // World bounds
  if (obj.y + obj.h >= H) {
    obj.y = H - obj.h;
    obj.vy = 0;
    obj.onGround = true;
  }
  if (obj.x < 0) { obj.x = 0; obj.vx = 0; }
  if (obj.x + obj.w > W) { obj.x = W - obj.w; obj.vx = 0; }
}

// ── Spawn particle burst ────────────────────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1.0,
      decay: Math.random() * 0.04 + 0.03,
      r: Math.random() * 3 + 1,
      color
    });
  }
}

// ── Enemy factory ─────────────────────────────────────────────────────────
function spawnEnemy() {
  const fromLeft = Math.random() < 0.5;
  const speedScale = 1 + score / 400;
  enemies.push({
    x: fromLeft ? -30 : W + 4,
    y: 386,
    w: 26, h: 34,
    vx: fromLeft ? (1.5 * speedScale) : -(1.5 * speedScale),
    vy: 0,
    onGround: false,
    jumpCooldown: 0,
    hitCooldown: 0,
  });
}

// ── AABB collision test ───────────────────────────────────────────────────
function aabb(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// ── Circle-AABB test (for bullets vs enemies) ─────────────────────────────
function circleAABB(cx, cy, cr, b) {
  const nearX = Math.max(b.x, Math.min(cx, b.x + b.w));
  const nearY = Math.max(b.y, Math.min(cy, b.y + b.h));
  const dx = cx - nearX, dy = cy - nearY;
  return dx * dx + dy * dy <= cr * cr;
}

// ── Update ─────────────────────────────────────────────────────────────────
function update(now) {
  if (state !== 'playing') return;

  const GRAVITY = 0.55;

  // Spawn enemies
  if (now - lastSpawn > spawnInterval) {
    spawnEnemy();
    lastSpawn = now;
    spawnInterval = Math.max(800, 2500 - score * 2);
  }

  // ── Player ──
  if (invincibleTimer > 0) invincibleTimer--;
  if (flashTimer > 0) flashTimer--;

  player.vx = 0;
  if (keys['a'] || keys['ArrowLeft'])  { player.vx = -4; player.facing = -1; }
  if (keys['d'] || keys['ArrowRight']) { player.vx =  4; player.facing =  1; }
  if ((keys['w'] || keys['ArrowUp'] || keys[' ']) && player.onGround) {
    player.vy = -12;
    player.onGround = false;
  }

  player.vy += GRAVITY;
  player.x += player.vx;
  player.y += player.vy;
  applyPlatformCollisions(player);

  // ── Bullets ──
  for (const b of bullets) {
    b.x += b.vx;
    b.y += b.vy;
  }
  // Remove off-screen bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    if (bullets[i].x < -20 || bullets[i].x > W + 20 || bullets[i].y < -20 || bullets[i].y > H + 20) {
      bullets.splice(i, 1);
    }
  }

  // ── Enemies ──
  for (let e = enemies.length - 1; e >= 0; e--) {
    const en = enemies[e];
    if (en.hitCooldown > 0) en.hitCooldown--;
    if (en.jumpCooldown > 0) en.jumpCooldown--;

    // Move toward player
    const dir = player.x > en.x ? 1 : -1;
    en.vx = dir * (1.5 + score / 400);
    en.vy += GRAVITY;
    en.x += en.vx;
    en.y += en.vy;
    applyPlatformCollisions(en);

    // Jump logic: try to reach player if player is above
    if (en.onGround && en.jumpCooldown <= 0 && player.y < en.y - 40) {
      en.vy = -11;
      en.onGround = false;
      en.jumpCooldown = 60;
    }

    // Off screen removal
    if (en.x < -100 || en.x > W + 100) {
      enemies.splice(e, 1);
      continue;
    }

    // Bullet collision
    let killed = false;
    for (let b = bullets.length - 1; b >= 0; b--) {
      if (circleAABB(bullets[b].x, bullets[b].y, 5, en)) {
        spawnParticles(en.x + en.w / 2, en.y + en.h / 2, '#ff4444', 10);
        spawnParticles(bullets[b].x, bullets[b].y, '#ffff00', 5);
        bullets.splice(b, 1);
        enemies.splice(e, 1);
        score += 10;
        killed = true;
        break;
      }
    }
    if (killed) continue;

    // Player collision
    if (invincibleTimer <= 0 && aabb(player, en)) {
      player.lives--;
      invincibleTimer = 120; // 2 sec invincibility
      flashTimer = 12;
      spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#00ffff', 14);
      enemies.splice(e, 1);
      if (player.lives <= 0) {
        state = 'gameover';
      }
    }
  }

  // ── Particles ──
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ── Draw helpers ────────────────────────────────────────────────────────────
function drawGlow(color, blur) {
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
}
function clearGlow() {
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
}

function drawPlayer() {
  if (invincibleTimer > 0 && Math.floor(invincibleTimer / 6) % 2 === 0) return; // blink

  const { x, y, w, h, facing } = player;
  const cx = x + w / 2;

  // Body
  drawGlow('#00ffff', 12);
  ctx.fillStyle = '#00cccc';
  ctx.fillRect(x + 3, y + 12, w - 6, h - 12);

  // Legs
  ctx.fillStyle = '#008899';
  ctx.fillRect(x + 3,     y + h - 10, 8, 10);
  ctx.fillRect(x + w - 11, y + h - 10, 8, 10);

  // Arms
  ctx.fillStyle = '#00aaaa';
  ctx.fillRect(facing === 1 ? x + w - 3 : x - 5, y + 14, 8, 6);

  // Head
  ctx.fillStyle = '#00eeff';
  ctx.beginPath();
  ctx.arc(cx, y + 7, 9, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  clearGlow();
  ctx.fillStyle = '#001a1a';
  const eyeOff = facing * 3;
  ctx.beginPath();
  ctx.arc(cx + eyeOff, y + 6, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#00ffff';
  ctx.beginPath();
  ctx.arc(cx + eyeOff + facing * 0.8, y + 5.5, 1, 0, Math.PI * 2);
  ctx.fill();
}

function drawEnemy(en) {
  const cx = en.x + en.w / 2;
  // Body
  drawGlow('#ff2222', 14);
  ctx.fillStyle = '#cc1111';
  ctx.fillRect(en.x, en.y + 10, en.w, en.h - 10);

  // Head
  ctx.fillStyle = '#ee2222';
  ctx.fillRect(en.x + 3, en.y, en.w - 6, 14);

  // Angry eyes
  clearGlow();
  ctx.fillStyle = '#ffcc00';
  ctx.fillRect(en.x + 5, en.y + 3, 5, 4);
  ctx.fillRect(en.x + en.w - 10, en.y + 3, 5, 4);

  // Pupils
  ctx.fillStyle = '#000';
  ctx.fillRect(en.x + 7, en.y + 4, 2, 3);
  ctx.fillRect(en.x + en.w - 9, en.y + 4, 2, 3);

  // Teeth
  ctx.fillStyle = '#ffaaaa';
  for (let t = 0; t < 3; t++) {
    ctx.fillRect(en.x + 4 + t * 7, en.y + 10, 4, 3);
  }
}

function drawPlatform(p) {
  // Fill
  ctx.fillStyle = '#1a2a3a';
  ctx.fillRect(p.x, p.y, p.w, p.h);

  // Top edge glow
  drawGlow('#4488bb', 8);
  ctx.strokeStyle = '#4499cc';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(p.x, p.y + 1);
  ctx.lineTo(p.x + p.w, p.y + 1);
  ctx.stroke();

  // Side/bottom
  clearGlow();
  ctx.strokeStyle = '#2a4a6a';
  ctx.lineWidth = 1;
  ctx.strokeRect(p.x, p.y, p.w, p.h);

  // Decorative rivets on ground
  if (p.h > 15) {
    ctx.fillStyle = '#2a4a6a';
    for (let rx = p.x + 20; rx < p.x + p.w - 10; rx += 40) {
      ctx.beginPath();
      ctx.arc(rx, p.y + p.h / 2, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawBullet(b) {
  drawGlow('#ffff00', 16);
  ctx.fillStyle = '#ffee00';
  ctx.beginPath();
  ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
  ctx.fill();
  // Trail
  ctx.fillStyle = 'rgba(255,220,0,0.3)';
  ctx.beginPath();
  ctx.arc(b.x - b.vx * 1.5, b.y - b.vy * 1.5, 3, 0, Math.PI * 2);
  ctx.fill();
  clearGlow();
}

function drawHUD() {
  // Lives
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#00ff88';
  ctx.fillText('LIVES', 12, 24);
  for (let i = 0; i < 3; i++) {
    const alive = i < player.lives;
    drawGlow(alive ? '#ff4466' : 'transparent', alive ? 8 : 0);
    ctx.fillStyle = alive ? '#ff4466' : '#333344';
    ctx.font = '18px monospace';
    ctx.fillText('♥', 62 + i * 22, 25);
  }
  clearGlow();

  // Score
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'right';
  drawGlow('#00ff88', 6);
  ctx.fillStyle = '#00ff88';
  ctx.fillText('SCORE  ' + String(score).padStart(5, '0'), W - 12, 24);
  clearGlow();

  // Crosshair indicator (subtle)
  ctx.strokeStyle = 'rgba(0,255,136,0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(mouse.x - 10, mouse.y);
  ctx.lineTo(mouse.x + 10, mouse.y);
  ctx.moveTo(mouse.x, mouse.y - 10);
  ctx.moveTo(mouse.x, mouse.y + 10);
  ctx.stroke();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    drawGlow(p.color, 6);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  clearGlow();
  ctx.globalAlpha = 1;
}

function drawOverlay(title, sub, sub2) {
  ctx.fillStyle = 'rgba(0, 0, 15, 0.75)';
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.textAlign = 'center';
  ctx.font = 'bold 52px monospace';
  drawGlow('#00aaff', 30);
  ctx.fillStyle = '#00ccff';
  ctx.fillText(title, W / 2, H / 2 - 40);
  clearGlow();

  if (sub) {
    ctx.font = '20px monospace';
    drawGlow('#00ff88', 10);
    ctx.fillStyle = '#00ff88';
    ctx.fillText(sub, W / 2, H / 2 + 20);
  }
  if (sub2) {
    ctx.font = '16px monospace';
    ctx.fillStyle = '#4499aa';
    clearGlow();
    ctx.fillText(sub2, W / 2, H / 2 + 55);
  }
  clearGlow();
}

// ── Main draw ──────────────────────────────────────────────────────────────
function draw() {
  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of STARS) {
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Screen flash on hit
  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255,50,50,${flashTimer / 20})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Platforms
  for (const p of PLATFORMS) drawPlatform(p);

  if (state === 'playing' || state === 'gameover') {
    // Particles (behind sprites)
    drawParticles();
    // Enemies
    for (const en of enemies) drawEnemy(en);
    // Player
    drawPlayer();
    // Bullets
    for (const b of bullets) drawBullet(b);
    // HUD
    drawHUD();
  }

  if (state === 'start') {
    drawOverlay('NEON SHOOTER', '— CLICK TO PLAY —', 'A/D: move  |  W: jump  |  Click: shoot');
  }
  if (state === 'gameover') {
    drawOverlay('GAME OVER', 'SCORE: ' + score, '— CLICK TO RESTART —');
  }
}

// ── Game loop ──────────────────────────────────────────────────────────────
let last = 0;
function loop(now) {
  if (now - last >= 16) {
    update(now);
    draw();
    last = now;
  }
  requestAnimationFrame(loop);
}

// ── Input ──────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  keys[e.key] = true;
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
  keys[e.key] = false;
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  mouse.x = (e.clientX - rect.left) * scaleX;
  mouse.y = (e.clientY - rect.top)  * scaleY;
});

canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;

  if (state === 'start') {
    initGame();
    state = 'playing';
    return;
  }
  if (state === 'gameover') {
    initGame();
    state = 'playing';
    return;
  }

  // Fire bullet
  const px = player.x + player.w / 2;
  const py = player.y + player.h / 2;
  const dx = mouse.x - px;
  const dy = mouse.y - py;
  const len = Math.sqrt(dx * dx + dy * dy) || 1;
  const spd = 12;
  bullets.push({ x: px, y: py, vx: (dx / len) * spd, vy: (dy / len) * spd });
});

// ── Start ──────────────────────────────────────────────────────────────────
initGame();
requestAnimationFrame(loop);
</script>
</body>
</html>
