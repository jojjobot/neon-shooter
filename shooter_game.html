<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON SHOOTER</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  canvas {
    display: block;
    cursor: crosshair;
    border: 1px solid #1a2a3a;
    box-shadow: 0 0 40px #00aaff33;
  }
</style>
</head>
<body>
<canvas id="c" width="800" height="450"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 450;

// ── Constants ──────────────────────────────────────────────────────────────────
const SHOOT_COOLDOWN = 18;   // frames between shots (~300ms)
const DASH_COOLDOWN  = 90;   // frames between dashes (~1.5s)
const DASH_DURATION  = 10;   // frames of active dash
const DASH_SPEED     = 14;   // px/frame during dash

// ── Stars (static background) ─────────────────────────────────────────────────
const STARS = [];
for (let i = 0; i < 70; i++) {
  STARS.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.2 + 0.3, a: Math.random() * 0.6 + 0.2 });
}

// ── Platform layout ───────────────────────────────────────────────────────────
const PLATFORMS = [
  { x: 0,   y: 420, w: 800, h: 30 },
  { x: 60,  y: 340, w: 150, h: 14 },
  { x: 290, y: 275, w: 170, h: 14 },
  { x: 555, y: 305, w: 130, h: 14 },
  { x: 170, y: 190, w: 140, h: 14 },
  { x: 510, y: 175, w: 155, h: 14 },
];

// ── Game state ─────────────────────────────────────────────────────────────────
let state = 'start'; // 'start' | 'playing' | 'gameover'
let score = 0;
let player, bullets, enemyBullets, enemies, particles;
let keys = {};
let mouse = { x: W / 2, y: H / 2 };
let lastSpawn = 0;
let spawnInterval = 2500;
let invincibleTimer = 0;
let flashTimer = 0;

function initGame() {
  score = 0;
  bullets = [];
  enemyBullets = [];
  enemies = [];
  particles = [];
  lastSpawn = performance.now();
  spawnInterval = 2500;
  invincibleTimer = 0;
  flashTimer = 0;
  player = {
    x: 380, y: 380,
    w: 26, h: 34,
    vx: 0, vy: 0,
    onGround: false,
    lives: 3,
    facing: 1,
    shootCooldown: 0,
    dashCooldown: 0,
    dashActive: 0,
  };
}

// ── Physics helpers ────────────────────────────────────────────────────────────
function applyPlatformCollisions(obj) {
  obj.onGround = false;
  for (const p of PLATFORMS) {
    const overlapX = obj.x < p.x + p.w && obj.x + obj.w > p.x;
    if (!overlapX) continue;
    const objBottom = obj.y + obj.h;
    const objTop    = obj.y;
    if (obj.vy >= 0 && objBottom >= p.y && objBottom <= p.y + p.h + obj.vy + 2) {
      obj.y = p.y - obj.h;
      obj.vy = 0;
      obj.onGround = true;
    } else if (obj.vy < 0 && objTop <= p.y + p.h && objTop >= p.y - 2) {
      obj.y = p.y + p.h;
      obj.vy = 0;
    }
  }
  if (obj.y + obj.h >= H) { obj.y = H - obj.h; obj.vy = 0; obj.onGround = true; }
  if (obj.x < 0)           { obj.x = 0; obj.vx = 0; }
  if (obj.x + obj.w > W)   { obj.x = W - obj.w; obj.vx = 0; }
}

// ── Particles ──────────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1.0,
      decay: Math.random() * 0.04 + 0.03,
      r: Math.random() * 3 + 1,
      color
    });
  }
}

// ── Enemy factory ─────────────────────────────────────────────────────────────
function randomEnemyType() {
  const r = Math.random();
  if (score < 30) return 'grunt';
  if (score < 80) return r < 0.7 ? 'grunt' : 'flyer';
  return r < 0.5 ? 'grunt' : r < 0.8 ? 'flyer' : 'shooter';
}

function spawnEnemy() {
  const fromLeft = Math.random() < 0.5;
  const type = randomEnemyType();
  const speedScale = 1 + score / 400;
  const baseVx = fromLeft ? 1.5 * speedScale : -1.5 * speedScale;

  if (type === 'grunt') {
    enemies.push({
      x: fromLeft ? -30 : W + 4, y: 386,
      w: 26, h: 34, vx: baseVx, vy: 0,
      onGround: false, jumpCooldown: 0, hitCooldown: 0, type: 'grunt',
    });
  } else if (type === 'flyer') {
    enemies.push({
      x: fromLeft ? -30 : W + 4, y: 80 + Math.random() * 180,
      w: 26, h: 22, vx: baseVx * 1.1, vy: 0,
      hitCooldown: 0, type: 'flyer',
      sineTime: Math.random() * Math.PI * 2,
    });
  } else if (type === 'shooter') {
    enemies.push({
      x: fromLeft ? -30 : W + 4, y: 386,
      w: 28, h: 36, vx: baseVx * 0.8, vy: 0,
      onGround: false, jumpCooldown: 0, hitCooldown: 0, type: 'shooter',
      shootTimer: 80 + Math.floor(Math.random() * 40),
    });
  }
}

// ── Collision helpers ─────────────────────────────────────────────────────────
function aabb(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}
function circleAABB(cx, cy, cr, b) {
  const nearX = Math.max(b.x, Math.min(cx, b.x + b.w));
  const nearY = Math.max(b.y, Math.min(cy, b.y + b.h));
  const dx = cx - nearX, dy = cy - nearY;
  return dx * dx + dy * dy <= cr * cr;
}

// ── Update ─────────────────────────────────────────────────────────────────────
function update(now) {
  if (state !== 'playing') return;

  const GRAVITY = 0.55;

  // Spawn enemies
  if (now - lastSpawn > spawnInterval) {
    spawnEnemy();
    lastSpawn = now;
    spawnInterval = Math.max(800, 2500 - score * 2);
  }

  // ── Player timers ──
  if (invincibleTimer > 0) invincibleTimer--;
  if (flashTimer > 0) flashTimer--;
  if (player.shootCooldown > 0) player.shootCooldown--;
  if (player.dashCooldown > 0) player.dashCooldown--;

  if (player.dashActive > 0) {
    invincibleTimer = Math.max(invincibleTimer, player.dashActive);
    if (player.dashActive % 2 === 0) {
      spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#00ffff', 2);
    }
    player.dashActive--;
  }

  // ── Player movement ──
  player.vx = 0;
  if (keys['a'] || keys['ArrowLeft'])  { player.vx = -4; player.facing = -1; }
  if (keys['d'] || keys['ArrowRight']) { player.vx =  4; player.facing =  1; }

  // Dash trigger (Shift)
  if (keys['Shift'] && player.dashCooldown <= 0 && player.dashActive <= 0) {
    player.dashActive = DASH_DURATION;
    player.dashCooldown = DASH_COOLDOWN;
    spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#00ffff', 10);
  }

  if (player.dashActive > 0) {
    player.vx = player.facing * DASH_SPEED;
  }

  if ((keys['w'] || keys['ArrowUp'] || keys[' ']) && player.onGround) {
    player.vy = -12;
    player.onGround = false;
  }

  player.vy += GRAVITY;
  player.x += player.vx;
  player.y += player.vy;
  applyPlatformCollisions(player);

  // ── Player bullets ──
  for (const b of bullets) { b.x += b.vx; b.y += b.vy; }
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) bullets.splice(i, 1);
  }

  // ── Enemy bullets ──
  for (const b of enemyBullets) { b.x += b.vx; b.y += b.vy; }
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
      enemyBullets.splice(i, 1);
      continue;
    }
    if (invincibleTimer <= 0 && circleAABB(b.x, b.y, 5, player)) {
      player.lives--;
      invincibleTimer = 120;
      flashTimer = 12;
      spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#00ffff', 14);
      enemyBullets.splice(i, 1);
      if (player.lives <= 0) state = 'gameover';
    }
  }

  // ── Enemies ──
  for (let e = enemies.length - 1; e >= 0; e--) {
    const en = enemies[e];
    if (en.hitCooldown > 0) en.hitCooldown--;

    if (en.type === 'grunt') {
      if (en.jumpCooldown > 0) en.jumpCooldown--;
      const dir = player.x > en.x ? 1 : -1;
      en.vx = dir * (1.5 + score / 400);
      en.vy += GRAVITY;
      en.x += en.vx;
      en.y += en.vy;
      applyPlatformCollisions(en);
      if (en.onGround && en.jumpCooldown <= 0 && player.y < en.y - 40) {
        en.vy = -11; en.onGround = false; en.jumpCooldown = 60;
      }

    } else if (en.type === 'flyer') {
      const dir = player.x > en.x ? 1 : -1;
      en.vx = dir * (1.8 + score / 400);
      en.sineTime += 0.06;
      const targetY = player.y - 40;
      en.vy = (targetY - en.y) * 0.04 + Math.sin(en.sineTime) * 2;
      en.x += en.vx;
      en.y += en.vy;
      if (en.y < 10) en.y = 10;
      if (en.y + en.h > H - 30) en.y = H - 30;

    } else if (en.type === 'shooter') {
      if (en.jumpCooldown > 0) en.jumpCooldown--;
      const dist = player.x - (en.x + en.w / 2);
      const absDist = Math.abs(dist);
      const dir = dist > 0 ? 1 : -1;
      const prefDist = 220;
      if (absDist > prefDist + 40)      en.vx = dir * (1.0 + score / 500);
      else if (absDist < prefDist - 40) en.vx = -dir * (1.0 + score / 500);
      else                              en.vx *= 0.9;
      en.vy += GRAVITY;
      en.x += en.vx;
      en.y += en.vy;
      applyPlatformCollisions(en);
      if (en.onGround && en.jumpCooldown <= 0 && player.y < en.y - 40) {
        en.vy = -11; en.onGround = false; en.jumpCooldown = 70;
      }
      // Fire at player
      en.shootTimer--;
      if (en.shootTimer <= 0) {
        en.shootTimer = 100 + Math.floor(Math.random() * 60);
        const ex = en.x + en.w / 2;
        const ey = en.y + en.h * 0.4;
        const dx = (player.x + player.w / 2) - ex;
        const dy = (player.y + player.h / 2) - ey;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        enemyBullets.push({ x: ex, y: ey, vx: (dx / len) * 5, vy: (dy / len) * 5 });
        spawnParticles(ex, ey, '#ff8800', 6);
      }
    }

    // Remove if off screen
    if (en.x < -120 || en.x > W + 120) { enemies.splice(e, 1); continue; }

    // Bullet hit
    let killed = false;
    for (let b = bullets.length - 1; b >= 0; b--) {
      if (circleAABB(bullets[b].x, bullets[b].y, 5, en)) {
        const col = en.type === 'flyer' ? '#dd00ff' : en.type === 'shooter' ? '#ff8800' : '#ff4444';
        spawnParticles(en.x + en.w / 2, en.y + en.h / 2, col, 10);
        spawnParticles(bullets[b].x, bullets[b].y, '#ffff00', 5);
        bullets.splice(b, 1);
        enemies.splice(e, 1);
        score += en.type === 'grunt' ? 10 : en.type === 'flyer' ? 15 : 20;
        killed = true;
        break;
      }
    }
    if (killed) continue;

    // Player contact
    if (invincibleTimer <= 0 && aabb(player, en)) {
      player.lives--;
      invincibleTimer = 120;
      flashTimer = 12;
      spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#00ffff', 14);
      enemies.splice(e, 1);
      if (player.lives <= 0) state = 'gameover';
    }
  }

  // ── Particles ──
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ── Draw helpers ───────────────────────────────────────────────────────────────
function drawGlow(color, blur) { ctx.shadowColor = color; ctx.shadowBlur = blur; }
function clearGlow() { ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; }

function drawPlayer() {
  // Blink when invincible, but not during dash
  if (invincibleTimer > 0 && player.dashActive <= 0 && Math.floor(invincibleTimer / 6) % 2 === 0) return;

  const { x, y, w, h, facing } = player;
  const cx = x + w / 2;

  drawGlow('#00ffff', player.dashActive > 0 ? 28 : 12);
  ctx.fillStyle = '#00cccc';
  ctx.fillRect(x + 3, y + 12, w - 6, h - 12);

  ctx.fillStyle = '#008899';
  ctx.fillRect(x + 3,      y + h - 10, 8, 10);
  ctx.fillRect(x + w - 11, y + h - 10, 8, 10);

  ctx.fillStyle = '#00aaaa';
  ctx.fillRect(facing === 1 ? x + w - 3 : x - 5, y + 14, 8, 6);

  ctx.fillStyle = '#00eeff';
  ctx.beginPath(); ctx.arc(cx, y + 7, 9, 0, Math.PI * 2); ctx.fill();

  clearGlow();
  ctx.fillStyle = '#001a1a';
  const eyeOff = facing * 3;
  ctx.beginPath(); ctx.arc(cx + eyeOff, y + 6, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#00ffff';
  ctx.beginPath(); ctx.arc(cx + eyeOff + facing * 0.8, y + 5.5, 1, 0, Math.PI * 2); ctx.fill();
}

function drawGruntEnemy(en) {
  drawGlow('#ff2222', 14);
  ctx.fillStyle = '#cc1111';
  ctx.fillRect(en.x, en.y + 10, en.w, en.h - 10);
  ctx.fillStyle = '#ee2222';
  ctx.fillRect(en.x + 3, en.y, en.w - 6, 14);
  clearGlow();
  ctx.fillStyle = '#ffcc00';
  ctx.fillRect(en.x + 5, en.y + 3, 5, 4);
  ctx.fillRect(en.x + en.w - 10, en.y + 3, 5, 4);
  ctx.fillStyle = '#000';
  ctx.fillRect(en.x + 7, en.y + 4, 2, 3);
  ctx.fillRect(en.x + en.w - 9, en.y + 4, 2, 3);
  ctx.fillStyle = '#ffaaaa';
  for (let t = 0; t < 3; t++) ctx.fillRect(en.x + 4 + t * 7, en.y + 10, 4, 3);
}

function drawFlyerEnemy(en) {
  const cx = en.x + en.w / 2;
  const cy = en.y + en.h / 2;
  const wingFlap = Math.sin(en.sineTime * 3) * 6;

  drawGlow('#cc00ff', 16);
  ctx.fillStyle = 'rgba(170,0,220,0.85)';
  // Left wing
  ctx.beginPath();
  ctx.moveTo(cx, cy + 2);
  ctx.lineTo(en.x - 18, cy - 8 + wingFlap);
  ctx.lineTo(en.x - 6, cy + 7);
  ctx.closePath();
  ctx.fill();
  // Right wing
  ctx.beginPath();
  ctx.moveTo(cx, cy + 2);
  ctx.lineTo(en.x + en.w + 18, cy - 8 + wingFlap);
  ctx.lineTo(en.x + en.w + 6, cy + 7);
  ctx.closePath();
  ctx.fill();

  // Body
  ctx.fillStyle = '#cc11ee';
  ctx.beginPath(); ctx.arc(cx, cy, 11, 0, Math.PI * 2); ctx.fill();

  clearGlow();
  ctx.fillStyle = '#ffaaff';
  ctx.beginPath(); ctx.arc(cx - 4, cy - 2, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 4, cy - 2, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#330033';
  ctx.beginPath(); ctx.arc(cx - 3.5, cy - 2.5, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 4.5, cy - 2.5, 1.5, 0, Math.PI * 2); ctx.fill();
}

function drawShooterEnemy(en) {
  const dir = player.x > en.x ? 1 : -1;
  drawGlow('#ff7700', 14);
  ctx.fillStyle = '#993300';
  ctx.fillRect(en.x, en.y + 10, en.w, en.h - 10);
  ctx.fillStyle = '#cc5500';
  ctx.fillRect(en.x + 3, en.y, en.w - 6, 14);

  // Gun barrel
  ctx.fillStyle = '#ffaa00';
  if (dir === 1) ctx.fillRect(en.x + en.w,      en.y + 13, 16, 7);
  else           ctx.fillRect(en.x - 16, en.y + 13, 16, 7);

  clearGlow();
  ctx.fillStyle = '#ff4400';
  ctx.fillRect(en.x + 5, en.y + 2, 6, 5);
  ctx.fillRect(en.x + en.w - 11, en.y + 2, 6, 5);
  ctx.fillStyle = '#fff';
  ctx.fillRect(en.x + 6, en.y + 3, 2, 3);
  ctx.fillRect(en.x + en.w - 9, en.y + 3, 2, 3);

  ctx.fillStyle = '#ffccaa';
  for (let t = 0; t < 3; t++) ctx.fillRect(en.x + 4 + t * 8, en.y + 10, 4, 3);
}

function drawEnemy(en) {
  if (en.type === 'grunt')        drawGruntEnemy(en);
  else if (en.type === 'flyer')   drawFlyerEnemy(en);
  else if (en.type === 'shooter') drawShooterEnemy(en);
}

function drawPlatform(p) {
  ctx.fillStyle = '#1a2a3a';
  ctx.fillRect(p.x, p.y, p.w, p.h);
  drawGlow('#4488bb', 8);
  ctx.strokeStyle = '#4499cc';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(p.x, p.y + 1);
  ctx.lineTo(p.x + p.w, p.y + 1);
  ctx.stroke();
  clearGlow();
  ctx.strokeStyle = '#2a4a6a';
  ctx.lineWidth = 1;
  ctx.strokeRect(p.x, p.y, p.w, p.h);
  if (p.h > 15) {
    ctx.fillStyle = '#2a4a6a';
    for (let rx = p.x + 20; rx < p.x + p.w - 10; rx += 40) {
      ctx.beginPath(); ctx.arc(rx, p.y + p.h / 2, 3, 0, Math.PI * 2); ctx.fill();
    }
  }
}

function drawBullet(b) {
  drawGlow('#ffff00', 16);
  ctx.fillStyle = '#ffee00';
  ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,220,0,0.3)';
  ctx.beginPath(); ctx.arc(b.x - b.vx * 1.5, b.y - b.vy * 1.5, 3, 0, Math.PI * 2); ctx.fill();
  clearGlow();
}

function drawEnemyBullet(b) {
  drawGlow('#ff6600', 14);
  ctx.fillStyle = '#ff8800';
  ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,100,0,0.3)';
  ctx.beginPath(); ctx.arc(b.x - b.vx * 1.5, b.y - b.vy * 1.5, 3, 0, Math.PI * 2); ctx.fill();
  clearGlow();
}

function drawHUD() {
  // Lives
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#00ff88';
  ctx.fillText('LIVES', 12, 24);
  for (let i = 0; i < 3; i++) {
    const alive = i < player.lives;
    drawGlow(alive ? '#ff4466' : 'transparent', alive ? 8 : 0);
    ctx.fillStyle = alive ? '#ff4466' : '#333344';
    ctx.font = '18px monospace';
    ctx.fillText('♥', 62 + i * 22, 25);
  }
  clearGlow();

  // Score
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'right';
  drawGlow('#00ff88', 6);
  ctx.fillStyle = '#00ff88';
  ctx.fillText('SCORE  ' + String(score).padStart(5, '0'), W - 12, 24);
  clearGlow();

  // Gun cooldown bar
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  const gunReady = player.shootCooldown <= 0;
  ctx.fillStyle = gunReady ? '#00ff88' : '#446644';
  ctx.fillText('GUN', 12, 44);
  ctx.fillStyle = '#0a1a0a';
  ctx.fillRect(44, 33, 80, 9);
  const gunFill = gunReady ? 80 : Math.round((1 - player.shootCooldown / SHOOT_COOLDOWN) * 80);
  if (gunReady) drawGlow('#00ff88', 6);
  ctx.fillStyle = gunReady ? '#00ff88' : '#336633';
  ctx.fillRect(44, 33, gunFill, 9);
  clearGlow();

  // Dash cooldown bar
  const dashReady = player.dashCooldown <= 0;
  ctx.fillStyle = dashReady ? '#00aaff' : '#334455';
  ctx.fillText('DASH', 12, 58);
  ctx.fillStyle = '#0a0f1a';
  ctx.fillRect(44, 48, 80, 9);
  const dashFill = dashReady ? 80 : Math.round((1 - player.dashCooldown / DASH_COOLDOWN) * 80);
  if (dashReady) drawGlow('#00aaff', 6);
  ctx.fillStyle = dashReady ? '#00aaff' : '#224466';
  ctx.fillRect(44, 48, dashFill, 9);
  clearGlow();

  // Crosshair
  ctx.strokeStyle = 'rgba(0,255,136,0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(mouse.x - 10, mouse.y);
  ctx.lineTo(mouse.x + 10, mouse.y);
  ctx.moveTo(mouse.x, mouse.y - 10);
  ctx.lineTo(mouse.x, mouse.y + 10);
  ctx.stroke();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    drawGlow(p.color, 6);
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
  clearGlow();
  ctx.globalAlpha = 1;
}

function drawOverlay(title, sub, sub2) {
  ctx.fillStyle = 'rgba(0, 0, 15, 0.75)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 52px monospace';
  drawGlow('#00aaff', 30);
  ctx.fillStyle = '#00ccff';
  ctx.fillText(title, W / 2, H / 2 - 40);
  clearGlow();
  if (sub) {
    ctx.font = '20px monospace';
    drawGlow('#00ff88', 10);
    ctx.fillStyle = '#00ff88';
    ctx.fillText(sub, W / 2, H / 2 + 20);
  }
  if (sub2) {
    ctx.font = '14px monospace';
    ctx.fillStyle = '#4499aa';
    clearGlow();
    ctx.fillText(sub2, W / 2, H / 2 + 55);
  }
  clearGlow();
}

// ── Main draw ──────────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  for (const s of STARS) {
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255,50,50,${flashTimer / 20})`;
    ctx.fillRect(0, 0, W, H);
  }

  for (const p of PLATFORMS) drawPlatform(p);

  if (state === 'playing' || state === 'gameover') {
    drawParticles();
    for (const en of enemies) drawEnemy(en);
    drawPlayer();
    for (const b of bullets) drawBullet(b);
    for (const b of enemyBullets) drawEnemyBullet(b);
    drawHUD();
  }

  if (state === 'start') {
    drawOverlay('NEON SHOOTER', '— CLICK TO PLAY —', 'A/D move  |  W jump  |  Shift dash  |  Click shoot');
  }
  if (state === 'gameover') {
    drawOverlay('GAME OVER', 'SCORE: ' + score, '— CLICK TO RESTART —');
  }
}

// ── Game loop ──────────────────────────────────────────────────────────────────
let last = 0;
function loop(now) {
  if (now - last >= 16) { update(now); draw(); last = now; }
  requestAnimationFrame(loop);
}

// ── Input ──────────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  keys[e.key] = true;
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
  keys[e.key] = false;
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  mouse.x = (e.clientX - rect.left) * scaleX;
  mouse.y = (e.clientY - rect.top)  * scaleY;
});

canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;

  if (state === 'start')    { initGame(); state = 'playing'; return; }
  if (state === 'gameover') { initGame(); state = 'playing'; return; }

  if (player.shootCooldown > 0) return;
  player.shootCooldown = SHOOT_COOLDOWN;

  const px = player.x + player.w / 2;
  const py = player.y + player.h / 2;
  const dx = mouse.x - px;
  const dy = mouse.y - py;
  const len = Math.sqrt(dx * dx + dy * dy) || 1;
  bullets.push({ x: px, y: py, vx: (dx / len) * 12, vy: (dy / len) * 12 });
});

// ── Start ──────────────────────────────────────────────────────────────────────
initGame();
requestAnimationFrame(loop);
</script>
