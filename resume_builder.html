<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0f1117;
  --surface:   #161b27;
  --surface2:  #1c2236;
  --border:    #252d40;
  --border2:   #2e3a52;
  --text:      #e2e8f0;
  --text-muted:#6b7a99;
  --text-dim:  #3d4f6e;
  --accent:    #3b82f6;
  --accent-hi: #60a5fa;
  --input-bg:  #1a2030;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 13px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 8px rgba(0,0,0,0.4);
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-logo {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.header-sub {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 1px;
}

.btn-pdf {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 0.83rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-pdf:hover { background: #2563eb; }
.btn-pdf:active { transform: scale(0.97); }

/* ── Layout ── */
.main {
  display: grid;
  grid-template-columns: 390px 1fr;
  min-height: calc(100vh - 57px);
}

/* ── Form panel ── */
.form-panel {
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  height: calc(100vh - 57px);
  position: sticky;
  top: 57px;
}

.form-panel::-webkit-scrollbar { width: 5px; }
.form-panel::-webkit-scrollbar-track { background: transparent; }
.form-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

.form-inner {
  padding: 22px 18px 48px;
}

.section-label {
  font-size: 0.66rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin: 26px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.section-label:first-child { margin-top: 0; }

.field { margin-bottom: 11px; }

.field label {
  display: block;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.field input,
.field textarea {
  width: 100%;
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 8px 11px;
  font-size: 0.84rem;
  color: var(--text);
  font-family: inherit;
  background: var(--input-bg);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.field input:focus,
.field textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}
.field input::placeholder,
.field textarea::placeholder { color: var(--text-dim); }

.field textarea {
  resize: vertical;
  min-height: 78px;
  line-height: 1.5;
}

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* ── Entry blocks ── */
.entry-block {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 9px;
}

.entry-block-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.entry-num {
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.btn-remove {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 1.15rem;
  line-height: 1;
  padding: 1px 5px;
  border-radius: 4px;
  transition: color 0.15s, background 0.15s;
}
.btn-remove:hover { color: #f87171; background: rgba(239,68,68,0.12); }

.btn-add {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  background: none;
  border: 1.5px dashed var(--border2);
  color: var(--text-muted);
  padding: 8px;
  border-radius: 7px;
  font-size: 0.81rem;
  font-weight: 500;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  font-family: inherit;
  margin-top: 2px;
}
.btn-add:hover {
  border-color: var(--accent);
  color: var(--accent-hi);
  background: rgba(59,130,246,0.07);
}

/* ── Preview panel ── */
.preview-panel {
  background: var(--bg);
  padding: 40px 32px;
  overflow-y: auto;
  height: calc(100vh - 57px);
}

.preview-panel::-webkit-scrollbar { width: 5px; }
.preview-panel::-webkit-scrollbar-track { background: transparent; }
.preview-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

/* ── Resume (always light — printed doc) ── */
#resume {
  background: #fff;
  max-width: 680px;
  margin: 0 auto;
  padding: 52px 56px;
  box-shadow: 0 4px 40px rgba(0,0,0,0.5);
  border-radius: 3px;
  min-height: 880px;
  color: #1a1a1a;
  font-family: 'Georgia', 'Times New Roman', serif;
  line-height: 1.5;
}

.r-header {
  padding-bottom: 16px;
  margin-bottom: 22px;
  border-bottom: 2px solid #111827;
}

.r-name {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  color: #111827;
  letter-spacing: -0.02em;
  line-height: 1.15;
}

.r-job-title {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.95rem;
  color: #6b7280;
  margin-top: 4px;
  margin-bottom: 10px;
}

.r-contact {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 18px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.78rem;
  color: #6b7280;
}

.r-section { margin-bottom: 20px; }

.r-section-title {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #374151;
  margin-bottom: 10px;
  padding-bottom: 5px;
  border-bottom: 1px solid #e5e7eb;
}

.r-summary {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.86rem;
  color: #374151;
  line-height: 1.65;
}

.r-exp { margin-bottom: 14px; }

.r-exp-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.r-exp-role {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  color: #111827;
}

.r-exp-dates {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.76rem;
  color: #9ca3af;
  white-space: nowrap;
  margin-left: 16px;
}

.r-exp-company {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.82rem;
  color: #6b7280;
  margin: 2px 0 6px;
}

.r-bullets { list-style: none; padding: 0; }
.r-bullets li {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.83rem;
  color: #374151;
  padding-left: 14px;
  position: relative;
  margin-bottom: 3px;
  line-height: 1.55;
}
.r-bullets li::before {
  content: '–';
  position: absolute;
  left: 0;
  color: #9ca3af;
}

.r-edu {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}
.r-edu-degree {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.87rem;
  font-weight: 600;
  color: #111827;
}
.r-edu-institution {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.8rem;
  color: #6b7280;
  margin-top: 1px;
}
.r-edu-dates {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.76rem;
  color: #9ca3af;
  white-space: nowrap;
  margin-left: 16px;
}

.r-skills { display: flex; flex-wrap: wrap; gap: 6px; }
.r-skill {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.78rem;
  color: #374151;
  background: #f3f4f6;
  border: 1px solid #e5e7eb;
  border-radius: 4px;
  padding: 3px 10px;
}

.r-placeholder {
  color: #d1d5db;
  font-style: italic;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.85rem;
}

/* ── Print / PDF ── */
@media print {
  .app-header, .form-panel { display: none !important; }
  body, html { background: #fff !important; }
  .main { display: block !important; }
  .preview-panel {
    background: #fff !important;
    padding: 0 !important;
    height: auto !important;
    overflow: visible !important;
  }
  #resume {
    box-shadow: none !important;
    border-radius: 0 !important;
    max-width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
    min-height: auto !important;
  }
  @page { size: A4; margin: 1.8cm 2cm; }
}

/* ── Mobile ── */
@media (max-width: 820px) {
  .main { grid-template-columns: 1fr; }
  .form-panel {
    position: static;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .preview-panel { height: auto; padding: 24px 16px; }
  #resume { padding: 36px 32px; }
}

@media (max-width: 520px) {
  .app-header { padding: 11px 14px; }
  .header-sub { display: none; }
  .btn-pdf { padding: 7px 13px; font-size: 0.78rem; }
  .form-inner { padding: 18px 14px 40px; }
  .field-row { grid-template-columns: 1fr; gap: 0; }
  #resume { padding: 28px 20px; }
  .r-name { font-size: 1.6rem; }
  .r-exp-header { flex-direction: column; }
  .r-edu { flex-direction: column; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-brand">
    <div class="header-logo">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="2" y="1" width="11" height="14" rx="1.5" fill="white" fill-opacity="0.15" stroke="white" stroke-width="1.3"/>
        <path d="M5 5.5h7M5 8h7M5 10.5h4.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
        <circle cx="14" cy="13" r="3" fill="#6366f1"/>
        <path d="M13 13l.9.9 1.6-1.6" stroke="white" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <div style="font-size:1rem;font-weight:600;color:var(--text);letter-spacing:-0.01em">Resume Builder</div>
      <div class="header-sub">Live preview · PDF export</div>
    </div>
  </div>
  <button class="btn-pdf" onclick="downloadPDF()">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
      <path d="M6.5 1v8M3.5 6.5l3 3 3-3M1 10.5v1a.5.5 0 00.5.5h10a.5.5 0 00.5-.5v-1" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Download PDF
  </button>
</header>

<div class="main">

  <!-- ── FORM ── -->
  <div class="form-panel">
    <div class="form-inner">

      <div class="section-label">Personal Information</div>
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="f-name" placeholder="Jane Smith" oninput="render()">
      </div>
      <div class="field">
        <label>Job Title</label>
        <input type="text" id="f-title" placeholder="Senior Product Designer" oninput="render()">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Email</label>
          <input type="email" id="f-email" placeholder="jane@example.com" oninput="render()">
        </div>
        <div class="field">
          <label>Phone</label>
          <input type="tel" id="f-phone" placeholder="+1 555 000 0000" oninput="render()">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Location</label>
          <input type="text" id="f-location" placeholder="New York, NY" oninput="render()">
        </div>
        <div class="field">
          <label>Website / LinkedIn</label>
          <input type="text" id="f-website" placeholder="linkedin.com/in/jane" oninput="render()">
        </div>
      </div>

      <div class="section-label">Summary</div>
      <div class="field">
        <textarea id="f-summary" placeholder="A brief professional summary that highlights your experience and what you bring to the table..." oninput="render()"></textarea>
      </div>

      <div class="section-label">Work Experience</div>
      <div id="exp-list"></div>
      <button class="btn-add" onclick="addExp()">+ Add Experience</button>

      <div class="section-label">Education</div>
      <div id="edu-list"></div>
      <button class="btn-add" onclick="addEdu()">+ Add Education</button>

      <div class="section-label">Skills</div>
      <div class="field">
        <label>Skills <span style="color:var(--text-dim);font-weight:400">(comma-separated)</span></label>
        <input type="text" id="f-skills" placeholder="Figma, User Research, HTML/CSS, JavaScript" oninput="render()">
      </div>

    </div>
  </div>

  <!-- ── PREVIEW ── -->
  <div class="preview-panel">
    <div id="resume"></div>
  </div>

</div>

<script>
let expItems = [];
let eduItems = [];

function addExp() {
  expItems.push({ id: Date.now(), role: '', company: '', dates: '', bullets: '' });
  rebuildForm(); render();
}
function removeExp(id) {
  expItems = expItems.filter(e => e.id !== id);
  rebuildForm(); render();
}
function addEdu() {
  eduItems.push({ id: Date.now(), degree: '', institution: '', dates: '' });
  rebuildForm(); render();
}
function removeEdu(id) {
  eduItems = eduItems.filter(e => e.id !== id);
  rebuildForm(); render();
}
function updateExp(id, key, val) {
  const item = expItems.find(e => e.id === id);
  if (item) { item[key] = val; render(); }
}
function updateEdu(id, key, val) {
  const item = eduItems.find(e => e.id === id);
  if (item) { item[key] = val; render(); }
}

function rebuildForm() {
  document.getElementById('exp-list').innerHTML = expItems.map((exp, i) => `
    <div class="entry-block">
      <div class="entry-block-header">
        <span class="entry-num">Position ${i + 1}</span>
        <button class="btn-remove" onclick="removeExp(${exp.id})">&#215;</button>
      </div>
      <div class="field">
        <label>Job Title / Role</label>
        <input type="text" placeholder="Product Designer" value="${esc(exp.role)}"
          oninput="updateExp(${exp.id}, 'role', this.value)">
      </div>
      <div class="field">
        <label>Company</label>
        <input type="text" placeholder="Acme Inc." value="${esc(exp.company)}"
          oninput="updateExp(${exp.id}, 'company', this.value)">
      </div>
      <div class="field">
        <label>Dates</label>
        <input type="text" placeholder="Jan 2021 – Present" value="${esc(exp.dates)}"
          oninput="updateExp(${exp.id}, 'dates', this.value)">
      </div>
      <div class="field">
        <label>Bullet Points <span style="color:var(--text-dim);font-weight:400">(one per line)</span></label>
        <textarea placeholder="Led design of core checkout flow, reducing drop-off by 22%&#10;Managed and mentored a team of 3 junior designers"
          oninput="updateExp(${exp.id}, 'bullets', this.value)">${esc(exp.bullets)}</textarea>
      </div>
    </div>
  `).join('');

  document.getElementById('edu-list').innerHTML = eduItems.map((edu, i) => `
    <div class="entry-block">
      <div class="entry-block-header">
        <span class="entry-num">Education ${i + 1}</span>
        <button class="btn-remove" onclick="removeEdu(${edu.id})">&#215;</button>
      </div>
      <div class="field">
        <label>Degree / Certificate</label>
        <input type="text" placeholder="B.S. Computer Science" value="${esc(edu.degree)}"
          oninput="updateEdu(${edu.id}, 'degree', this.value)">
      </div>
      <div class="field">
        <label>Institution</label>
        <input type="text" placeholder="Massachusetts Institute of Technology" value="${esc(edu.institution)}"
          oninput="updateEdu(${edu.id}, 'institution', this.value)">
      </div>
      <div class="field">
        <label>Dates</label>
        <input type="text" placeholder="2015 – 2019" value="${esc(edu.dates)}"
          oninput="updateEdu(${edu.id}, 'dates', this.value)">
      </div>
    </div>
  `).join('');
}

function render() {
  const name     = v('f-name');
  const title    = v('f-title');
  const email    = v('f-email');
  const phone    = v('f-phone');
  const location = v('f-location');
  const website  = v('f-website');
  const summary  = v('f-summary');
  const skills   = v('f-skills');

  const contacts = [email, phone, location, website].filter(Boolean);

  let html = `<div class="r-header">`;
  html += `<div class="r-name">${name ? esc(name) : '<span class="r-placeholder">Your Name</span>'}</div>`;
  if (title) html += `<div class="r-job-title">${esc(title)}</div>`;
  if (contacts.length) html += `<div class="r-contact">${contacts.map(c => `<span>${esc(c)}</span>`).join('')}</div>`;
  html += `</div>`;

  if (summary) {
    html += `<div class="r-section"><div class="r-section-title">Summary</div><div class="r-summary">${esc(summary)}</div></div>`;
  }

  const filledExp = expItems.filter(e => e.role || e.company);
  if (filledExp.length) {
    html += `<div class="r-section"><div class="r-section-title">Experience</div>`;
    filledExp.forEach(exp => {
      const bullets = exp.bullets ? exp.bullets.split('\n').map(l => l.trim()).filter(Boolean) : [];
      html += `<div class="r-exp">
        <div class="r-exp-header">
          <div class="r-exp-role">${esc(exp.role || 'Role')}</div>
          ${exp.dates ? `<div class="r-exp-dates">${esc(exp.dates)}</div>` : ''}
        </div>
        ${exp.company ? `<div class="r-exp-company">${esc(exp.company)}</div>` : ''}
        ${bullets.length ? `<ul class="r-bullets">${bullets.map(b => `<li>${esc(b)}</li>`).join('')}</ul>` : ''}
      </div>`;
    });
    html += `</div>`;
  }

  const filledEdu = eduItems.filter(e => e.degree || e.institution);
  if (filledEdu.length) {
    html += `<div class="r-section"><div class="r-section-title">Education</div>`;
    filledEdu.forEach(edu => {
      html += `<div class="r-edu">
        <div>
          <div class="r-edu-degree">${esc(edu.degree || 'Degree')}</div>
          ${edu.institution ? `<div class="r-edu-institution">${esc(edu.institution)}</div>` : ''}
        </div>
        ${edu.dates ? `<div class="r-edu-dates">${esc(edu.dates)}</div>` : ''}
      </div>`;
    });
    html += `</div>`;
  }

  if (skills) {
    const tags = skills.split(',').map(s => s.trim()).filter(Boolean);
    if (tags.length) {
      html += `<div class="r-section"><div class="r-section-title">Skills</div><div class="r-skills">${tags.map(t => `<span class="r-skill">${esc(t)}</span>`).join('')}</div></div>`;
    }
  }

  document.getElementById('resume').innerHTML = html;
}

function v(id) { return (document.getElementById(id)?.value || '').trim(); }

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function downloadPDF() { window.print(); }

addExp();
addEdu();
</script>
</body>
</html>
