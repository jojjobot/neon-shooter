<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0f2f5;
  color: #111827;
  min-height: 100vh;
}

/* ── Header ── */
.app-header {
  background: #fff;
  border-bottom: 1px solid #e5e7eb;
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.app-header h1 {
  font-size: 1.1rem;
  font-weight: 600;
  color: #111827;
  letter-spacing: -0.01em;
}

.btn-pdf {
  background: #2563eb;
  color: #fff;
  border: none;
  padding: 9px 18px;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  font-family: inherit;
}
.btn-pdf:hover { background: #1d4ed8; }
.btn-pdf:active { transform: scale(0.97); }

/* ── Main layout ── */
.main {
  display: grid;
  grid-template-columns: 400px 1fr;
  min-height: calc(100vh - 57px);
}

/* ── Form panel ── */
.form-panel {
  background: #fff;
  border-right: 1px solid #e5e7eb;
  overflow-y: auto;
  height: calc(100vh - 57px);
  position: sticky;
  top: 57px;
}

.form-inner {
  padding: 24px 20px 40px;
}

.section-label {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: #9ca3af;
  margin: 26px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid #f3f4f6;
}
.section-label:first-child { margin-top: 0; }

.field { margin-bottom: 12px; }

.field label {
  display: block;
  font-size: 0.775rem;
  font-weight: 500;
  color: #374151;
  margin-bottom: 4px;
}

.field input,
.field textarea {
  width: 100%;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  padding: 8px 11px;
  font-size: 0.85rem;
  color: #111827;
  font-family: inherit;
  background: #fff;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.field input:focus,
.field textarea:focus {
  outline: none;
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}
.field input::placeholder,
.field textarea::placeholder { color: #c4c9d4; }

.field textarea {
  resize: vertical;
  min-height: 80px;
  line-height: 1.5;
}

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* ── Entry blocks (exp / edu) ── */
.entry-block {
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 10px;
}

.entry-block-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.entry-num {
  font-size: 0.73rem;
  font-weight: 600;
  color: #9ca3af;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.btn-remove {
  background: none;
  border: none;
  color: #d1d5db;
  cursor: pointer;
  font-size: 1.2rem;
  line-height: 1;
  padding: 1px 5px;
  border-radius: 4px;
  transition: color 0.15s, background 0.15s;
}
.btn-remove:hover { color: #ef4444; background: #fee2e2; }

.btn-add {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  background: none;
  border: 1.5px dashed #d1d5db;
  color: #9ca3af;
  padding: 8px;
  border-radius: 7px;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  font-family: inherit;
  margin-top: 2px;
}
.btn-add:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }

/* ── Preview panel ── */
.preview-panel {
  background: #f0f2f5;
  padding: 40px 32px;
  overflow-y: auto;
  height: calc(100vh - 57px);
}

/* ── The resume itself ── */
#resume {
  background: #fff;
  max-width: 680px;
  margin: 0 auto;
  padding: 52px 56px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.09);
  border-radius: 3px;
  min-height: 880px;
  color: #1a1a1a;
  font-family: 'Georgia', 'Times New Roman', serif;
  line-height: 1.5;
}

.r-header {
  padding-bottom: 16px;
  margin-bottom: 22px;
  border-bottom: 2px solid #111827;
}

.r-name {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  color: #111827;
  letter-spacing: -0.02em;
  line-height: 1.15;
}

.r-job-title {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.95rem;
  color: #6b7280;
  margin-top: 4px;
  margin-bottom: 10px;
}

.r-contact {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 18px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.78rem;
  color: #6b7280;
}

.r-section { margin-bottom: 20px; }

.r-section-title {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #374151;
  margin-bottom: 10px;
  padding-bottom: 5px;
  border-bottom: 1px solid #e5e7eb;
}

.r-summary {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.86rem;
  color: #374151;
  line-height: 1.65;
}

.r-exp { margin-bottom: 14px; }

.r-exp-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.r-exp-role {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  color: #111827;
}

.r-exp-dates {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.76rem;
  color: #9ca3af;
  white-space: nowrap;
  margin-left: 16px;
}

.r-exp-company {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.82rem;
  color: #6b7280;
  margin: 2px 0 6px;
}

.r-bullets { list-style: none; padding: 0; }
.r-bullets li {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.83rem;
  color: #374151;
  padding-left: 14px;
  position: relative;
  margin-bottom: 3px;
  line-height: 1.55;
}
.r-bullets li::before {
  content: '–';
  position: absolute;
  left: 0;
  color: #9ca3af;
}

.r-edu {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}
.r-edu-degree {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.87rem;
  font-weight: 600;
  color: #111827;
}
.r-edu-institution {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.8rem;
  color: #6b7280;
  margin-top: 1px;
}
.r-edu-dates {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.76rem;
  color: #9ca3af;
  white-space: nowrap;
  margin-left: 16px;
}

.r-skills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.r-skill {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.78rem;
  color: #374151;
  background: #f3f4f6;
  border: 1px solid #e5e7eb;
  border-radius: 4px;
  padding: 3px 10px;
}

.r-placeholder {
  color: #d1d5db;
  font-style: italic;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.85rem;
}

/* ── Print / PDF ── */
@media print {
  .app-header,
  .form-panel { display: none !important; }

  body, html { background: #fff !important; }

  .main { display: block !important; }

  .preview-panel {
    background: #fff !important;
    padding: 0 !important;
    height: auto !important;
    overflow: visible !important;
  }

  #resume {
    box-shadow: none !important;
    border-radius: 0 !important;
    max-width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
    min-height: auto !important;
  }

  @page {
    size: A4;
    margin: 1.8cm 2cm;
  }
}

/* ── Mobile ── */
@media (max-width: 820px) {
  .main { grid-template-columns: 1fr; }

  .form-panel {
    position: static;
    height: auto;
    border-right: none;
    border-bottom: 1px solid #e5e7eb;
  }

  .preview-panel {
    height: auto;
    padding: 24px 16px;
  }

  #resume { padding: 36px 32px; }
}

@media (max-width: 520px) {
  .app-header { padding: 12px 16px; }
  .app-header h1 { font-size: 1rem; }
  .btn-pdf { padding: 8px 14px; font-size: 0.8rem; }
  .form-inner { padding: 18px 14px 40px; }
  .field-row { grid-template-columns: 1fr; gap: 0; }
  #resume { padding: 28px 20px; }
  .r-name { font-size: 1.6rem; }
  .r-exp-header { flex-direction: column; }
  .r-edu { flex-direction: column; }
}
</style>
</head>
<body>

<header class="app-header">
  <h1>Resume Builder</h1>
  <button class="btn-pdf" onclick="downloadPDF()">&#8595; Download as PDF</button>
</header>

<div class="main">

  <!-- ────── FORM ────── -->
  <div class="form-panel">
    <div class="form-inner">

      <div class="section-label">Personal Information</div>

      <div class="field">
        <label>Full Name</label>
        <input type="text" id="f-name" placeholder="Jane Smith" oninput="render()">
      </div>
      <div class="field">
        <label>Job Title</label>
        <input type="text" id="f-title" placeholder="Senior Product Designer" oninput="render()">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Email</label>
          <input type="email" id="f-email" placeholder="jane@example.com" oninput="render()">
        </div>
        <div class="field">
          <label>Phone</label>
          <input type="tel" id="f-phone" placeholder="+1 555 000 0000" oninput="render()">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Location</label>
          <input type="text" id="f-location" placeholder="New York, NY" oninput="render()">
        </div>
        <div class="field">
          <label>Website / LinkedIn</label>
          <input type="text" id="f-website" placeholder="linkedin.com/in/jane" oninput="render()">
        </div>
      </div>

      <div class="section-label">Summary</div>
      <div class="field">
        <textarea id="f-summary" placeholder="A brief professional summary that highlights your experience and what you bring to the table..." oninput="render()"></textarea>
      </div>

      <div class="section-label">Work Experience</div>
      <div id="exp-list"></div>
      <button class="btn-add" onclick="addExp()">+ Add Experience</button>

      <div class="section-label">Education</div>
      <div id="edu-list"></div>
      <button class="btn-add" onclick="addEdu()">+ Add Education</button>

      <div class="section-label">Skills</div>
      <div class="field">
        <label>Skills <span style="color:#c4c9d4;font-weight:400">(comma-separated)</span></label>
        <input type="text" id="f-skills" placeholder="Figma, User Research, HTML/CSS, JavaScript" oninput="render()">
      </div>

    </div>
  </div>

  <!-- ────── PREVIEW ────── -->
  <div class="preview-panel">
    <div id="resume"></div>
  </div>

</div>

<script>
let expItems = [];
let eduItems = [];

// ── State mutators ──────────────────────────────────

function addExp() {
  expItems.push({ id: Date.now(), role: '', company: '', dates: '', bullets: '' });
  rebuildForm();
  render();
}

function removeExp(id) {
  expItems = expItems.filter(e => e.id !== id);
  rebuildForm();
  render();
}

function addEdu() {
  eduItems.push({ id: Date.now(), degree: '', institution: '', dates: '' });
  rebuildForm();
  render();
}

function removeEdu(id) {
  eduItems = eduItems.filter(e => e.id !== id);
  rebuildForm();
  render();
}

function updateExp(id, key, val) {
  const item = expItems.find(e => e.id === id);
  if (item) { item[key] = val; render(); }
}

function updateEdu(id, key, val) {
  const item = eduItems.find(e => e.id === id);
  if (item) { item[key] = val; render(); }
}

// ── Form builder ────────────────────────────────────

function rebuildForm() {
  document.getElementById('exp-list').innerHTML = expItems.map((exp, i) => `
    <div class="entry-block">
      <div class="entry-block-header">
        <span class="entry-num">Position ${i + 1}</span>
        <button class="btn-remove" onclick="removeExp(${exp.id})" title="Remove">&#215;</button>
      </div>
      <div class="field">
        <label>Job Title / Role</label>
        <input type="text" placeholder="Product Designer" value="${esc(exp.role)}"
          oninput="updateExp(${exp.id}, 'role', this.value)">
      </div>
      <div class="field">
        <label>Company</label>
        <input type="text" placeholder="Acme Inc." value="${esc(exp.company)}"
          oninput="updateExp(${exp.id}, 'company', this.value)">
      </div>
      <div class="field">
        <label>Dates</label>
        <input type="text" placeholder="Jan 2021 – Present" value="${esc(exp.dates)}"
          oninput="updateExp(${exp.id}, 'dates', this.value)">
      </div>
      <div class="field">
        <label>Bullet Points <span style="color:#c4c9d4;font-weight:400">(one per line)</span></label>
        <textarea placeholder="Led design of core checkout flow, reducing drop-off by 22%&#10;Managed and mentored a team of 3 junior designers"
          oninput="updateExp(${exp.id}, 'bullets', this.value)">${esc(exp.bullets)}</textarea>
      </div>
    </div>
  `).join('');

  document.getElementById('edu-list').innerHTML = eduItems.map((edu, i) => `
    <div class="entry-block">
      <div class="entry-block-header">
        <span class="entry-num">Education ${i + 1}</span>
        <button class="btn-remove" onclick="removeEdu(${edu.id})" title="Remove">&#215;</button>
      </div>
      <div class="field">
        <label>Degree / Certificate</label>
        <input type="text" placeholder="B.S. Computer Science" value="${esc(edu.degree)}"
          oninput="updateEdu(${edu.id}, 'degree', this.value)">
      </div>
      <div class="field">
        <label>Institution</label>
        <input type="text" placeholder="Massachusetts Institute of Technology" value="${esc(edu.institution)}"
          oninput="updateEdu(${edu.id}, 'institution', this.value)">
      </div>
      <div class="field">
        <label>Dates</label>
        <input type="text" placeholder="2015 – 2019" value="${esc(edu.dates)}"
          oninput="updateEdu(${edu.id}, 'dates', this.value)">
      </div>
    </div>
  `).join('');
}

// ── Resume renderer ──────────────────────────────────

function render() {
  const name     = v('f-name');
  const title    = v('f-title');
  const email    = v('f-email');
  const phone    = v('f-phone');
  const location = v('f-location');
  const website  = v('f-website');
  const summary  = v('f-summary');
  const skills   = v('f-skills');

  const contacts = [email, phone, location, website].filter(Boolean);

  let html = `<div class="r-header">`;
  html += `<div class="r-name">${name ? esc(name) : '<span class="r-placeholder">Your Name</span>'}</div>`;
  if (title)    html += `<div class="r-job-title">${esc(title)}</div>`;
  if (contacts.length) {
    html += `<div class="r-contact">${contacts.map(c => `<span>${esc(c)}</span>`).join('')}</div>`;
  }
  html += `</div>`;

  if (summary) {
    html += `
      <div class="r-section">
        <div class="r-section-title">Summary</div>
        <div class="r-summary">${esc(summary)}</div>
      </div>`;
  }

  const filledExp = expItems.filter(e => e.role || e.company);
  if (filledExp.length) {
    html += `<div class="r-section"><div class="r-section-title">Experience</div>`;
    filledExp.forEach(exp => {
      const bullets = exp.bullets
        ? exp.bullets.split('\n').map(l => l.trim()).filter(Boolean)
        : [];
      html += `<div class="r-exp">`;
      html += `<div class="r-exp-header">
        <div class="r-exp-role">${esc(exp.role || 'Role')}</div>
        ${exp.dates ? `<div class="r-exp-dates">${esc(exp.dates)}</div>` : ''}
      </div>`;
      if (exp.company) html += `<div class="r-exp-company">${esc(exp.company)}</div>`;
      if (bullets.length) {
        html += `<ul class="r-bullets">${bullets.map(b => `<li>${esc(b)}</li>`).join('')}</ul>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  }

  const filledEdu = eduItems.filter(e => e.degree || e.institution);
  if (filledEdu.length) {
    html += `<div class="r-section"><div class="r-section-title">Education</div>`;
    filledEdu.forEach(edu => {
      html += `<div class="r-edu">
        <div>
          <div class="r-edu-degree">${esc(edu.degree || 'Degree')}</div>
          ${edu.institution ? `<div class="r-edu-institution">${esc(edu.institution)}</div>` : ''}
        </div>
        ${edu.dates ? `<div class="r-edu-dates">${esc(edu.dates)}</div>` : ''}
      </div>`;
    });
    html += `</div>`;
  }

  if (skills) {
    const tags = skills.split(',').map(s => s.trim()).filter(Boolean);
    if (tags.length) {
      html += `<div class="r-section">
        <div class="r-section-title">Skills</div>
        <div class="r-skills">${tags.map(t => `<span class="r-skill">${esc(t)}</span>`).join('')}</div>
      </div>`;
    }
  }

  document.getElementById('resume').innerHTML = html;
}

// ── Helpers ──────────────────────────────────────────

function v(id) {
  return (document.getElementById(id)?.value || '').trim();
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function downloadPDF() {
  window.print();
}

// ── Init ─────────────────────────────────────────────
addExp();
addEdu();
</script>
</body>
</html>
